  # NOTICES
  /notices:
    get:
      operationId: listNotices
      tags: [notices]
      summary: List notices
      parameters:
        - name: departmentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: pinned
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: Notices
          content:
            application/json:
              schema:
                type: array
