kind = "web"
previewPath = "/"
title = "College LMS Platform"
version = "1.0.0"
id = "artifacts/college-lms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19482

[services.development]
run = "pnpm --filter @workspace/college-lms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/college-lms", "run", "build" ]
publicDir = "artifacts/college-lms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19482"
BASE_PATH = "/"
